# Netlify config for the web app (pnpm monorepo).
# In the Netlify UI: Base directory = repo root (default) so pnpm installs the
# whole workspace and resolves @bcc/shared; Package directory = apps/web (this dir).
# The @netlify/plugin-nextjs plugin handles Next.js App Router SSR/ISR + the
# /api/revalidate route handler.
[build]
  command = "pnpm --filter @bcc/web build"
  publish = "apps/web/.next"
  # Skip the build when nothing the web app depends on changed (worker-only,
  # docs, or workflow commits). Exit 0 = skip, non-zero = build. The ":/"
  # pathspec prefix is repo-root-relative, so this works regardless of which
  # directory Netlify runs the command from.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- ':/apps/web' ':/packages' ':/pnpm-lock.yaml'"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Long browser caching for heavy static assets so returning visitors don't
# re-request them (Netlify's default is max-age=0 + etag revalidation, which
# still costs a web request per file per visit).
[[headers]]
  for = "/map/terrain/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Enemy/road overlays are regenerated by the resource-snapshot workflow, so
# cap browser staleness at a day.
[[headers]]
  for = "/map/enemies/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=86400"

[[headers]]
  for = "/map/roads/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=86400"
